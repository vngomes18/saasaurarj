{% extends "layout/base.html" %}

{% block title %}Login - SaaS Sistema{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <h2><i class="fas fa-store text-primary me-2"></i>SaaS Gestão</h2>
            <p>Faça login para acessar seu painel</p>
        </div>

        <form method="POST" class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope me-1"></i>Email
                </label>
                <input type="email" class="form-control" id="email" name="email" required>
                <div class="invalid-feedback">
                    Por favor, insira um email válido.
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">
                    <i class="fas fa-lock me-1"></i>Senha
                </label>
                <input type="password" class="form-control" id="password" name="password" required>
                <div class="invalid-feedback">
                    Por favor, insira sua senha.
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="fas fa-sign-in-alt me-2"></i>Entrar
            </button>
        </form>

        <div class="text-center">
            <p class="mb-0">Não tem uma conta? 
                <a href="{{ url_for('register') }}" class="text-decoration-none">
                    Cadastre-se aqui
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
