{% extends "layout/base.html" %}
{% block content %}
<div class="container mt-4">
  <h2>Admin - Visão Geral do Banco</h2>
  <div class="row mt-3">
    {% for name, count in counts.items() %}
    <div class="col-md-3 mb-3">
      <div class="card h-100">
        <div class="card-body">
          <h6 class="card-title text-uppercase">{{ name }}</h6>
          <p class="card-text display-6">{{ count }}</p>
          <a href="{{ url_for('admin_table', table_name=name) }}" class="btn btn-sm btn-primary">Ver registros</a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
